<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | FocusFlow</title>

    <link rel="stylesheet" href="css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left">

        <h1>Welcome Back 👋</h1>

        <p>

            Login to continue your productivity journey with
            FocusFlow.

        </p>

        <img src="https://undraw.co/api/illustrations/undraw_time_management_re_tk5w.svg"
        alt="Illustration">

    </div>

    <!-- Right Side -->

    <div class="right">

        <form id="loginForm">

            <h2>Login</h2>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Password"
                required>

                <i
                class="fa-solid fa-eye"
                id="togglePassword"></i>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit">

                Login

            </button>

            <p class="signup">

                Don't have an account?

                <a href="signup.html">

                    Sign Up

                </a>

            </p>

        </form>

    </div>

</div>

<script src="js/script.js"></script>

</body>

</html>
